<!DOCTYPE html>
<html lang="en">
<head>
  <!--SEO Meta Tags-->
  <title>Basic HTML Website</title>
  <meta 
    name="description" 
    content="A simple basic contact page of my HTML website"
  >
  <meta charset="UTF-8">
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >
  
  <!--OG Tags-->
  <meta 
    property="og:title" 
    content="Basic HTML Website"
  >
  <meta 
    property="og:description" 
    content="A simple basic contact page of my HTML website"
  >

  <!-- I have no image for this yet, so I will leave it blank for now. I will add it later when I have one. -->
  <meta 
    property="og:image" 
    content="">
  <meta property="og:url" content="https://bingbong-create.github.io/my-roadmap-projects/">
  <meta property="og:type" content="website">
  
  <!--Favicon-->
  <link rel="icon" type="image" href="../assets/website-icon.jpg" alt="website icon">
</head>
<body>
  <h1>Contact Me</h1>
  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>

    <label for="message">Message:</label>
    <textarea id="message" name="message"></textarea>
  </form>
</body>
</html>
